# claude-gate 前端 nginx 配置：SPA 回退 + 反代后端 API
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 客户端请求体上限：略大于 gateway 自身的 50MB，避免大请求被 nginx 提前 413 拒绝；
    # 让 gateway 来决策真正的上限并返回结构化错误，而不是 nginx 返回原始 HTML 413。
    # 大模型请求（长上下文 + 多轮历史 + tool_use 返回）很容易超过 nginx 默认的 1MB。
    client_max_body_size 60m;
    # 代理读上游响应的超时，配合 SSE 长流式
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # 静态资源缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 管理 API 与代理路径转发到网关（注意精确前缀，避免与前端路由 /api-keys 冲突）
    location /api/ {
        proxy_pass http://gateway:8791;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/ {
        proxy_pass http://gateway:8791;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;            # 流式 SSE 不缓冲
    }

    # SPA 前端路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
